<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колесо монстров</title>
</head>
<body>
<script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
<script>
  async function openWheel() {
    await miro.board.ui.openPanel({
      url: 'index.html',
      width: 800,
    });
  }

  miro.board.ui.on('icon:click', openWheel);

  // Fallback: если иконку уже кликнули до загрузки страницы
  openWheel().catch(() => {});
</script>
</body>
</html>
