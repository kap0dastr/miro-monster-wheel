#
# КАК ЗАПОЛНИТЬ:
# 1. Посмотри картинки в папке ./monsters/ (01.png, 02.png...)
# 2. Для каждой задачи укажи номер картинки монстра + данные задачи
# 3. Сохрани файл — я соберу из него колесо
#
# ВСЕ ПОЛЯ:
#   monster_image  — имя файла из папки monsters/ (например "14.png")
#   task_number    — номер/код задачи (например "SPRINT-42" или "1")
#   task_link      — ссылка на задачу (Jira / Trello / Notion / любая URL)
#   task_name      — название задачи
#   score          — оценка задачи (story points / сложность)
#   banner_image   — вторая картинка (длинная/баннер), путь к файлу или URL
#   warriors       — список исполнителей (список имён через -)

